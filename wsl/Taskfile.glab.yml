version: "3"

includes:
  utils: Taskfile.utils.yml

tasks:
  default:
    - task: utils:user
      vars:
        ARGS: "task glab:glab"

  glab: |
    mkdir -p /home/{{ .USER }}/.config/glab-cli
    cp {{ .CONFIG_WSL }}/glab.yml /home/{{ .USER }}/.config/glab-cli/config.yml
    # Change permissions to 600
    chmod 600 /home/{{ .USER }}/.config/glab-cli/config.yml
