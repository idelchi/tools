services:
  init:
    extends: .code
    container_name: code-init
    hostname: code-init
    user: root
    entrypoint:
      - /bin/bash
      - -c
    command:
      - |
        find /home/user -path /home/user/.local/share/uv -prune -o -printf '%u:%g %p\n' | awk '$1!="user:user"{sub(/^[^ ]+ /,""); print $0}' | xargs -r chown user:user

  code:
    extends: .code
    volumes:
      - ${PWD}:/home/user/${CODER_DIR:-ws}
    env_file:
      - tokens.env
      - secrets.env
    depends_on:
      init:
        condition: service_completed_successfully

  .code:
    build:
      dockerfile: ${DOTAI}/Dockerfile
      secrets:
        - tokens.env
    image: idelchi/code:latest
    container_name: code
    hostname: code
    volumes:
      - ${DOTAI}/guides:/home/user/guides
      # Claude
      - ${DOTAI}/.cli/.claude/${CLAUDE_CODE_DIR:-.claude}:/home/user/.claude
      - ${DOTAI}/.cli/.claude/.claude.json:/home/user/.claude.json
      # Codex
      - ${DOTAI}/.cli/.codex:/home/user/.codex
      # Gemini
      - ${DOTAI}/.cli/.gemini:/home/user/.gemini
      # Copilot
      - ${DOTAI}/.cli/.copilot:/home/user/.copilot
      # Qwen
      - ${DOTAI}/.cli/.qwen:/home/user/.qwen
      # Mistral vibe
      - ${DOTAI}/.cli/.mistral:/home/user/.vibe
      # Copilot API
      - ${DOTAI}/.cli/.copilot-api:/home/user/.local/share/copilot-api
      # Tasks
      - ${DOTAI}/tasks:/home/user/tasks
      # Dotfiles
      - ${DOTFILES}:/home/user/.dotfiles
      # Git
      - ${USERPROFILE}/.gitconfig:/home/user/.gitconfi
      # Zsh history
      - ${DOTAI}/.zsh_history:/home/user/.zsh_history
      # Kubeconfig
      - ${DOTAI}/k3s/k3s.yaml:/home/user/.kube/config
      # Slot
      - ${USERPROFILE}/.config/slot:/home/user/.config/slot
      # Cache
      - cache:/home/user/.cache
      # Zinit
      - zinit:/home/user/.local/share/zinit
      # Docker
      # - //var/run/docker.sock:/var/run/docker.sock
    working_dir: /home/user/${CODER_DIR:-ws}
    environment:
      - KUBECONFIG=/home/user/.kube/config
    secrets:
      - k3s.yaml
    networks:
      - code
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse

volumes:
  cache:
    name: cache
  zinit:
    name: zinit

secrets:
  tokens.env:
    file: ./tokens.env
  k3s.yaml:
    file: ./k3s/k3s.yaml

networks:
  code:
    name: code
    driver: bridge
