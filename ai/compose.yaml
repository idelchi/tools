services:
  init:
    extends: .code-noop
    container_name: code-init
    hostname: code-init
    user: root
    entrypoint:
      - /bin/bash
      - -c
    command:
      - |
        find /home/user -path /home/user/.local/share/uv -prune -o -printf '%u:%g %p\n' | awk '$1!="user:user"{sub(/^[^ ]+ /,""); print $0}' | xargs -r chown user:user

  .code-common:
    extends: .code
    volumes:
      - ${PWD}:/home/user/${CODER_DIR:-ws}
    depends_on:
      init:
        condition: service_completed_successfully

  code:
    extends: .code-common
    networks:
      - code

  code-docker:
    extends: .code-common
    volumes:
      - //var/run/docker.sock:/var/run/docker.sock
      # Minikube
      - minikube-cache:/home/user/.minikube
    cap_add:
      - SYS_ADMIN
    devices:
      - /dev/fuse
    network_mode: host

  code-k8s:
    extends: .code-common
    volumes:
      # Kubeconfig
      - ${DOTAI}/k3s/k3s.yaml:/home/user/.kube/config
    environment:
      - KUBECONFIG=/home/user/.kube/config
    networks:
      - code

  .code-noop:
    extends: .code
    network_mode: none

  .code:
    env_file:
      - secrets.env
    extra_hosts:
      - vm.lan:192.168.1.143
      - vm.garfield-labs.com:192.168.1.143
    build:
      dockerfile: ${DOTAI}/Dockerfile
      secrets:
        - secrets.env
    image: docker.garfield-labs.com/ai/code:${TAG:-latest}
    container_name: code
    hostname: code
    volumes:
      # Guides
      - ${DOTAI}/guides:/home/user/guides
      # Claude
      - ${DOTAI}/.cli/.claude/${CLAUDE_CODE_DIR:-.claude}:/home/user/.claude
      - ${DOTAI}/.cli/.claude/.claude.json:/home/user/.claude.json
      # Codex
      - ${DOTAI}/.cli/.codex:/home/user/.codex
      # Gemini
      - ${DOTAI}/.cli/.gemini:/home/user/.gemini
      # Copilot
      - ${DOTAI}/.cli/.copilot:/home/user/.copilot
      # Qwen
      - ${DOTAI}/.cli/.qwen:/home/user/.qwen
      # Opencode
      - ${DOTAI}/.cli/.opencode/.config:/home/user/.config/opencode
      - ${DOTAI}/.cli/.opencode/.share:/home/user/.local/share/opencode
      # Crush
      - ${DOTAI}/.cli/.crush/.config:/home/user/.config/crush
      - ${DOTAI}/.cli/.crush/.share:/home/user/.local/share/crush
      - ${DOTAI}/.cli/.crush/.data:/home/user/.crush/
      # Nanocoder
      - ${DOTAI}/.cli/.nanocoder/.nanocoder-preferences.json:/home/user/.nanocoder-preferences.json
      - ${DOTAI}/.cli/.nanocoder/agents.config.json:/home/user/agents.config.json
      # Mistral vibe
      - ${DOTAI}/.cli/.mistral:/home/user/.vibe
      # Kilo Code
      - ${DOTAI}/.cli/.kilo/.share:/home/user/.local/share/kilo
      - ${DOTAI}/.cli/.kilo/.state:/home/user/.local/state/kilo
      # Claude Code Router
      - ${DOTAI}/.cli/.claude-code-router:/home/user/.claude-code-router
      # Copilot API
      - ${DOTAI}/.cli/.copilot-api:/home/user/.local/share/copilot-api
      # Tasks
      - ${DOTAI}/tasks:/home/user/tasks
      # Dotfiles
      - ${DOTFILES}:/home/user/.dotfiles
      # Zsh history
      - ${DOTAI}/.zsh_history:/home/user/.zsh_history
      # Kubeconfig
      - ${DOTAI}/k3s/k3s.yaml:/home/user/.kube/config
      # Slot
      - ${USERPROFILE}/.config/slot:/home/user/.config/slot
      # Cache
      - cache:/home/user/.cache
      # Zinit
      - zinit:/home/user/.local/share/zinit
    working_dir: /home/user/${CODER_DIR:-ws}

volumes:
  cache:
    name: cache
  zinit:
    name: zinit
  minikube-cache:
    name: minikube-cache

secrets:
  secrets.env:
    file: ./secrets.env

networks:
  code:
    name: code
    driver: bridge
