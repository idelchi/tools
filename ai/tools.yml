- junegunn/fzf
- starship/starship
- go-task/task
- astral-sh/uv
- name: astral-sh/uv
  exe: uvx
- astral-sh/ruff
- kubernetes-sigs/kustomize
- idelchi/dotgen
- idelchi/aggr
- idelchi/slot
- idelchi/gocry
- idelchi/gonc
- name: idelchi/aura
  source:
    github:
      pre: true

- name: golangci/golangci-lint
  description: Linters Runner for Go
  tags:
    - terminal

- name: atuinsh/atuin
  hints:
    pattern: server
    match: excluded
    type: contains

- name: mikefarah/yq
  exe:
    patterns: "{{ .Exe }}_*"

- name: so-fancy/diff-so-fancy
  hints:
    # No extension for the binary
    pattern: ^[^.]+$
    type: regex

- name: jqlang/jq
  hints:
    pattern: "{{ .ARCH }}"
    match: required
    type: contains

- name: BurntSushi/ripgrep
  exe: rg

- name: ahmetb/kubectx
  description: Faster way to switch between clusters and namespaces in kubectl
  exe: kubectx

- name: ahmetb/kubectx
  description: Faster way to switch between clusters and namespaces in kubectl
  exe: kubens

- name: derailed/k9s
  description: Kubernetes CLI To Manage Your Clusters In Style!
  version:
    commands: version

- name: helm/helm
  description: The package manager for Kubernetes
  url: https://get.helm.sh/helm-{{ .Version }}-{{ .OS }}-{{ .ARCH }}.tar.gz
  checksum:
    type: file
    value: "{{ .URL }}.sha256sum"
  tags:
    - kubernetes

- name: fluxcd/flux2
  description: Open and extensible continuous delivery solution for Kubernetes. Powered by GitOps Toolkit.
  exe: flux
  tags:
    - kubernetes

- name: kubernetes/kubernetes
  description: Command-line tool for controlling Kubernetes clusters
  url: https://dl.k8s.io/release/{{ .Version }}/bin/{{ .OS }}/{{ .ARCH }}/kubectl{{ .EXTENSION }}
  checksum:
    type: sha256
    value: url:{{ .URL }}.sha256
  exe: kubectl

- name: kubernetes/minikube
  description: Run Kubernetes locally
  version:
    commands: version
  hints:
    pattern: .tar.gz
    match: required
    type: endswith
  tags:
    - kubernetes

- name: kdash-rs/kdash
  description: A simple and fast dashboard for Kubernetes
  checksum:
    type: sha256
    value: url:{{ .URLWithoutExtensions }}.sha256

- kubernetes-sigs/krew
- stern/stern
- sbstp/kubie
- ahmetb/kubectl-tree

- name: danielfoehrKn/kubeswitch
  description: The kubectx for operators
  checksum: none
  exe: switcher

- name: gitlab-org/cli
  description: glab is an open source GitLab CLI tool
  exe: glab
  hints:
    - pattern: .zip
      match: '{{ if eq .OS "windows" }}required{{ end }}'
      type: endswith
    - pattern: .tar.gz
      match: '{{ if ne .OS "windows" }}required{{ end }}'
      type: endswith
  inherit: gitlab

- name: sharkdp/fd
  description: A simple, fast and user-friendly alternative to 'find'
  hints:
    pattern: .tar.gz
    match: '{{ if ne .OS "windows" }}required{{ else }}excluded{{ end }}'
    type: endswith
  tags:
    - terminal


- rtk-ai/rtk

- name: argoproj/argo-cd
  description: Declarative continuous deployment for Kubernetes
  exe: argocd
  tags:
    - kubernetes

- name: cli/cli
  description: GitHub's official command line tool
  exe: gh
  tags:
    - terminal

- name: hairyhenderson/gomplate
  description: A versatile Go template processor
  hints:
    # gomplate releases both the `.exe` and `.zip` which would have identical scores
    pattern: .zip
    weight: |-
      {{- if eq .OS "windows" -}}
      1
      {{- else -}}
      0
      {{- end -}}
    type: endswith
  tags:
    - terminal

- name: deuxfleurs-org/garage
  description: S3-compatible object store for small self-hosted geo-distributed deployments
  version: v2.3.0
  url: https://garagehq.deuxfleurs.fr/_releases/{{ .Version }}/{{ index .ARCH_ALIASES 0 }}-unknown-{{ .OS }}-musl/garage
  checksum: none
  skip:
    - reason: "garage is only available on linux"
      condition: '{{ ne .OS "linux" }}'
  tags:
    - terminal

- name: hashicorp/terraform
  description: Infrastructure as Code tool
  url: https://releases.hashicorp.com/terraform/{{ .Version | trimPrefix "v" }}/terraform_{{ .Version | trimPrefix "v" }}_{{ .OS }}_{{ .ARCH }}.zip
  checksum:
    type: file
    value: '{{ .Base }}/{{ .Exe }}_{{ .Version | trimPrefix "v" }}_SHA256SUMS'
  tags:
    - terminal

- name: terraform-linters/tflint
  description: A Pluggable Terraform Linter
  tags:
    - terminal

- name: hashicorp/vault
  description: Secure, store, and tightly control access to tokens, passwords, certificates, API keys, and other secrets
  url: https://releases.hashicorp.com/vault/{{ .Version | trimPrefix "v" }}/vault_{{ .Version | trimPrefix "v" }}_{{ .OS }}_{{ .ARCH }}.zip
  checksum:
    type: file
    value: '{{ .Base }}/{{ .Exe }}_{{ .Version | trimPrefix "v" }}_SHA256SUMS'
  tags:
    - terminal

- name: FiloSottile/age
  description: A simple, modern and secure encryption tool
  checksum: none
  tags:
    - terminal

- name: FiloSottile/age
  description: A simple, modern and secure encryption tool
  exe: age-keygen
  checksum: none
  tags:
    - terminal

- name: getsops/sops
  description: Simple and flexible tool for managing secrets
  skip:
    reason: "sops is not available on windows"
    condition: '{{ eq .OS "windows" }}'
  hints:
    pattern: "{{ .ARCH }}"
    type: endswith
  tags:
    - terminal

- name: yannh/kubeconform
  description: A FAST Kubernetes manifests validator, with support for Custom Resources!
  tags:
    - kubernetes

- name: coder/coder
  description: Secure environments for developers and their agents
  hints:
    pattern: installer
    match: excluded
    type: contains
  tags:
    - terminal

- name: home-operations/flate
  description: A Flux resource validator and inflator
  tags:
    - terminal

- name: ankitpokhrel/jira-cli
  description: Feature-rich interactive Jira command line
  exe: jira
  tags:
    - terminal

- name: oras-project/oras
  description: A tool for managing container images and artifacts in OCI registries
  tags:
    - docker
